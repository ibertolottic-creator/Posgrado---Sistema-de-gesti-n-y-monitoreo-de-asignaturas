    function initCoordinadores(forceSync = false) {
        document.getElementById('coord-content').style.display = 'none';
        const loader = document.getElementById('coord-loader');
        loader.style.display = 'flex';
        
        const btn = document.getElementById('btnRecargarCoord');
        if(btn) {
            btn.innerHTML = forceSync 
                 ? '<i class="fa-solid fa-cloud-arrow-down fa-beat"></i> Sincronizando BI...'
                 : '<i class="fa-solid fa-spinner fa-spin"></i> Trabajando...';
            btn.disabled = true;
        }
  
        google.script.run
            .withSuccessHandler(onCoordinadoresSuccess)
            .withFailureHandler(err => {
                loader.style.display = 'none';
                if(btn) {
                    btn.innerHTML = '<i class="fa-solid fa-sync-alt"></i> Intentar de Nuevo';
                    btn.disabled = false;
                }
                showToast("Error de Servidor", err.toString(), "error");
            })
            .getMetricasCoordinadores(forceSync);
    }
  
    // Módulo de Snapshot de Tiempos
    function guardarSnapshotCoordinadores() {
        if (!RAW_COORD_DATA || RAW_COORD_DATA.length === 0) {
            showToast("Atención", "No hay datos para guardar. Actualice el dashboard primero.", "warning");
            return;
        }

        const btn = document.getElementById('btnGuardarSnapshot');
        if(btn) {
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando...';
            btn.disabled = true;
        }

        // Usamos la misma estructura de coordinadores reducida del Map-Reduce
        let coordMap = {};
        RAW_COORD_DATA.forEach(r => {
            if(!coordMap[r.coord]) {
                coordMap[r.coord] = {
                    coord: r.coord, total: 0,
                    lmsAprobados: 0, lmsProceso: 0, acompAprobados: 0, acompProceso: 0,
                    hits: 0, mails: 0, wa: 0, audits: 0, auditsLms: 0, auditsAcp: 0,
                    // Promedios Antiguos
                    auditLmsTotal: 0, auditLmsCount: 0,
                    // Tiempos Raw Clustering
                    rawLmsW: [[], [], [], []], rawAcp: []
                };
            }
            let c = coordMap[r.coord];
            c.total++;
            c.hits += r.h; c.mails += r.m; c.wa += r.w;
            c.auditsLms += r.a_lms; c.auditsAcp += r.a_acp;
            c.audits = c.auditsLms + c.auditsAcp;

            if(r.s_lms > 0) c.lmsAprobados++; else if(r.startedLms) c.lmsProceso++;
            if(r.s_acp > 0) c.acompAprobados++; else if(r.startedAcp) c.acompProceso++;
            
            if (r.audit_lms > 0) { c.auditLmsTotal += r.audit_lms; c.auditLmsCount++; }
            
            if (r.raw_lms_w) {
                for (let w=0; w<6; w++) {
                    if (r.raw_lms_w[w] && r.raw_lms_w[w].length > 0) c.rawLmsW[w].push(...r.raw_lms_w[w]);
                }
            }
            if (r.raw_acp && r.raw_acp.length > 0) c.rawAcp.push(...r.raw_acp);
        });

        const GAP_TOLERANCE_MS = 15 * 60 * 1000;
        const BASE_CRITERIA_MS = 2 * 60 * 1000;
        
        let dumpData = Object.values(coordMap).map(c => {
            // Calcular Clusters Finales antes de enviar
            c.lmsTsTotal = 0;
            for (let w=0; w<6; w++) {
                let bag = c.rawLmsW[w];
                if (bag && bag.length > 0) {
                    bag.sort((a,b) => a - b);
                    let totalMs = BASE_CRITERIA_MS;
                    for (let i = 1; i < bag.length; i++) {
                        let diff = bag[i] - bag[i-1];
                        if (diff <= GAP_TOLERANCE_MS) totalMs += diff;
                        else totalMs += BASE_CRITERIA_MS;
                    }
                    c.lmsTsTotal += (totalMs / 60000);
                }
            }
            
            c.acpTsTotal = 0;
            if (c.rawAcp && c.rawAcp.length > 0) {
                c.rawAcp.sort((a,b) => a - b);
                let totalMsAcp = BASE_CRITERIA_MS;
                for (let i = 1; i < c.rawAcp.length; i++) {
                     let diff = c.rawAcp[i] - c.rawAcp[i-1];
                     if (diff <= GAP_TOLERANCE_MS) totalMsAcp += diff;
                     else totalMsAcp += BASE_CRITERIA_MS;
                }
                c.acpTsTotal = totalMsAcp / 60000;
            }
            
            c.avgLms = c.auditLmsCount > 0 ? c.auditLmsTotal / c.auditLmsCount : 0;
            c.avgAcomp = c.total > 0 ? c.acpTsTotal / c.total : 0;
            
            // Delete raw properties to save bandwidth
            delete c.rawLmsW;
            delete c.rawAcp;
            delete c.auditLmsTotal;
            delete c.auditLmsCount;
            
            return c;
        });

        google.script.run
            .withSuccessHandler(res => {
                if(btn) {
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> Listo';
                    setTimeout(() => {
                        btn.innerHTML = '<i class="fa-solid fa-database"></i> Guardar Snapshot';
                        btn.disabled = false;
                    }, 3000);
                }
                if(res.success) {
                    showToast("Snapshot Guardado", res.message, "success");
                } else {
                    showToast("Error BD", res.message, "error");
                }
            })
            .withFailureHandler(err => {
                if(btn) {
                    btn.innerHTML = '<i class="fa-solid fa-database"></i> Guardar Snapshot';
                    btn.disabled = false;
                }
                showToast("Error de Conexión", err.toString(), "error");
            })
            .saveCoordinatorSnapshot(JSON.stringify(dumpData));
    }
  
    function onCoordinadoresSuccess(response) {
        if (!response.success) {
            document.getElementById('coord-loader').style.display = 'none';
            document.getElementById('btnRecargarCoord').disabled = false;
            document.getElementById('btnRecargarCoord').innerHTML = '<i class="fa-solid fa-sync-alt"></i> Actualizar';
            showToast("Advertencia BI", response.message, "warning");
            return;
        }
  
        RAW_COORD_DATA = response.data || [];
        
        // Populate Filtros
        var setProgs = new Set();
        var setCoords = new Set();
        
        RAW_COORD_DATA.forEach(r => {
            if(r.prog) setProgs.add(r.prog);
            if(r.coord) setCoords.add(r.coord);
        });

        // Populate Dropdowns
        const cboProg = document.getElementById('filtroCoordPrograma');
        cboProg.innerHTML = '<option value="TODOS" selected>Todos los Programas</option>';
        [...setProgs].sort().forEach(p => cboProg.add(new Option(p, p)));

        const cboCoord = document.getElementById('filtroCoordAlias');
        cboCoord.innerHTML = '<option value="TODOS" selected>Todos los Coordinadores</option>';
        [...setCoords].sort().forEach(c => cboCoord.add(new Option(c, c)));

        // Fill Tab logic
        document.getElementById('coord-tabs-container').style.display = 'block';

        // Auto-inyección obsoleta removida, el contenedor ya es estático en el HTML.

        // Render Initial Dashboard
        renderCoordinadoresDashboard();
  
        document.getElementById('coord-loader').style.display = 'none';
        document.getElementById('coord-content').style.display = 'flex';
        
        const btn = document.getElementById('btnRecargarCoord');
        if(btn) {
            btn.innerHTML = '<i class="fa-solid fa-sync-alt"></i> Actualizar Front';
            btn.disabled = false;
        }
        showToast("Métricas Analizadas", "Data Lake de Gestión descargado exitosamente.", "success");
    }

        const bgAll = tab === 'ALL' ? 'border-indigo-500 text-indigo-600' : 'border-transparent text-slate-500';

        document.getElementById('tabCoordLMS').className = 'flex align-center pb-2 px-1 border-b-2 font-bold cursor-pointer transition-colors ' + bgLms;

    /**
     * Helper: Convertir minutos a HH:MM -> ej. 145 => "2h 25m"
     */
    function formatMinutes(minStr) {
        let m = parseFloat(minStr);
        if (isNaN(m) || m === 0) return "-";
        m = Math.round(m);
        if (m < 60) return `${m}m`;
        let hr = Math.floor(m / 60);
        let rem = m % 60;
        return rem > 0 ? `${hr}h ${rem}m` : `${hr}h`;
    }

    /**
     * Map-Reduce en Frontend
     */
    function renderCoordinadoresDashboard() {
        if (!RAW_COORD_DATA || RAW_COORD_DATA.length === 0) return;

        // 1. Filtrar Data según Tabs
            let filteredData = RAW_COORD_DATA.filter(r => {
                if (document.getElementById('filtroCoordPrograma').value !== 'TODOS' && r.prog !== document.getElementById('filtroCoordPrograma').value) return false;
                if (document.getElementById('filtroCoordAlias').value !== 'TODOS' && r.coord !== document.getElementById('filtroCoordAlias').value) return false;
                return true;
            });

            // 2. Map-Reduce (Agrupación por Coordinador)
            let coordMap = {};
            let globals = {
                lmsAprobados: 0, lmsProceso: 0, 
                acompAprobados: 0, acompProceso: 0,
                totalAsigs: filteredData.length,
                evidencias: 0, bursts: 0
            };

            filteredData.forEach(r => {
                if (!coordMap[r.coord]) {
                    coordMap[r.coord] = {
                        coord: r.coord,
                        total: 0,
                        lmsAprobados: 0, lmsProceso: 0,
                        // Promedio Min LMS (audit_time clásico)
                        auditLmsTotal: 0, auditLmsCount: 0,
                        auditLmsTotalW: [0,0,0,0,0,0], auditLmsCountW: [0,0,0,0,0,0],
                        // Tiempo Absoluto LMS (Clustering Session-Based)
                        lmsTsTotal: 0, lmsTsTotalW: [0,0,0,0,0,0], lmsTsCountW: [0,0,0,0,0,0], dedicLmsW: [0,0,0,0,0,0],
                        rawLmsW: [[], [], [], [], [], []],
                        rawAcp: [],
                        acompAprobados: 0, acompProceso: 0, acpTsTotal: 0, acpTsCount: 0,
                        hits: 0, mails: 0, wa: 0, audits: 0, auditsLms: 0, auditsAcp: 0,
                        hitsW: [0,0,0,0,0,0], mailsW: [0,0,0,0,0,0], waW: [0,0,0,0,0,0], 
                        auditsW: [0,0,0,0,0,0], auditsLmsW: [0,0,0,0,0,0], auditsAcpW: [0,0,0,0,0,0]
                    };
                }
                let c = coordMap[r.coord];
                c.total++;

                // LMS Logic
                if(r.s_lms !== null && r.s_lms > 0) { 
                    c.lmsAprobados++; globals.lmsAprobados++;
                } else if (r.startedLms) {
                    c.lmsProceso++; globals.lmsProceso++;
                }
                // ---- PROMEDIO MIN LMS (audit_time clásico) ----
                if (r.audit_lms > 0) {
                    c.auditLmsTotal += r.audit_lms;
                    c.auditLmsCount++;
                }
                if (r.audit_lms_w) {
                    for (let w=0; w<6; w++) {
                        if (r.audit_lms_w[w] > 0) {
                            c.auditLmsTotalW[w] += r.audit_lms_w[w];
                            c.auditLmsCountW[w]++;
                        }
                    }
                }
                
                // ---- TIEMPO ABSOLUTO LMS (Extracción Raw para Clustering) ----
                if (r.raw_lms_w) {
                    for (let w=0; w<6; w++) {
                        if (r.raw_lms_w[w] && r.raw_lms_w[w].length > 0) {
                            c.rawLmsW[w].push(...r.raw_lms_w[w]);
                        }
                    }
                }

                // Acomp Logic
                if(r.s_acp !== null && r.s_acp > 0) { 
                    c.acompAprobados++; globals.acompAprobados++;
                } else if (r.startedAcp) {
                    c.acompProceso++; globals.acompProceso++;
                }
                if (r.raw_acp && r.raw_acp.length > 0) {
                    c.rawAcp.push(...r.raw_acp); 
                    c.acpTsCount++;
                }

                c.hits += (r.h || 0);
                c.mails += (r.m || 0);
                c.wa += (r.w || 0);
                c.auditsLms += (r.a_lms || 0);
                c.auditsAcp += (r.a_acp || 0);
                c.audits = c.auditsLms + c.auditsAcp;

                if (r.h_w) for(let w=0; w<6; w++) c.hitsW[w] += r.h_w[w];
                if (r.m_w) for(let w=0; w<6; w++) c.mailsW[w] += r.m_w[w];
                if (r.w_w) for(let w=0; w<6; w++) c.waW[w] += r.w_w[w];
                if (r.a_lms_w || r.a_acp_w) {
                    for(let w=0; w<6; w++) {
                         if (r.a_lms_w) c.auditsLmsW[w] += r.a_lms_w[w];
                         if (r.a_acp_w) c.auditsAcpW[w] += r.a_acp_w[w];
                         let auds = (r.a_lms_w ? r.a_lms_w[w] : 0) + (r.a_acp_w ? r.a_acp_w[w] : 0);
                         c.auditsW[w] += auds;
                    }
                }

                globals.evidencias += ((r.h || 0) + (r.m || 0) + (r.w || 0));
                globals.bursts += c.audits;
            });

            // 3. Generar Arrays de Resumen
            let coordinadores = Object.values(coordMap);
            
            // Calcular Avances para ordenar
            coordinadores.forEach(c => {
                c.pctLms = c.total > 0 ? (c.lmsAprobados / c.total) * 100 : 0;
                c.pctAcomp = c.total > 0 ? (c.acompAprobados / c.total) * 100 : 0;
                
                // ===== PROMEDIO MIN LMS (audit_time clásico) =====
                c.avgLmsW = [0,0,0,0,0,0];
                for (let w=0; w<6; w++) {
                    c.avgLmsW[w] = c.auditLmsCountW[w] > 0 ? c.auditLmsTotalW[w] / c.auditLmsCountW[w] : 0;
                }
                c.avgLms = c.auditLmsCount > 0 ? c.auditLmsTotal / c.auditLmsCount : 0;
                
                // ===== TIEMPO ABSOLUTO LMS Y ACOMP (Clustering Algorithm) =====
                c.lmsTsTotal = 0;
                const GAP_TOLERANCE_MS = 15 * 60 * 1000;
                const BASE_CRITERIA_MS = 2 * 60 * 1000;
                
                for (let w=0; w<6; w++) {
                    let bag = c.rawLmsW[w];
                    if (bag && bag.length > 0) {
                        bag.sort((a,b) => a - b);
                        let totalMs = 0;
                        let lastValidI = 0;
                        for (let i = 0; i < bag.length; i++) {
                            if (i === 0) {
                                totalMs += BASE_CRITERIA_MS;
                                c.dedicLmsW[w]++;
                            } else {
                                let diff = bag[i] - bag[lastValidI];
                                if (diff <= GAP_TOLERANCE_MS) { totalMs += diff; lastValidI = i; }
                                else if (diff > GAP_TOLERANCE_MS && diff <= 28800000) { totalMs += BASE_CRITERIA_MS; c.dedicLmsW[w]++; lastValidI = i; }
                            }
                        }
                        c.lmsTsTotalW[w] = (totalMs / 60000);
                        c.lmsTsTotal += c.lmsTsTotalW[w];
                    }
                }
                // === Clustering ACOMP ===
                c.acpTsTotal = 0;
                if (c.rawAcp && c.rawAcp.length > 0) {
                    c.rawAcp.sort((a,b) => a - b);
                    let tMs = 0;
                    for (let i = 0; i < c.rawAcp.length; i++) {
                        if (i === 0) tMs += BASE_CRITERIA_MS;
                        else {
                            let diff = c.rawAcp[i] - c.rawAcp[i-1];
                            if (diff <= GAP_TOLERANCE_MS) tMs += diff;
                            else tMs += BASE_CRITERIA_MS;
                        }
                    }
                    c.acpTsTotal = tMs / 60000;
                }
                
                // ===== DEDICACIÓN LMS =====
                c.dedicLms = c.total > 0 ? (c.lmsTsTotal / c.total) : 0;
                c.avgAcomp = c.total > 0 ? c.acpTsTotal / c.total : 0;
                c.dedicAcomp = c.acpTsTotal;
            });

            // Ranking Sorting General (Usando Promedio de ambos LMS/ACOMP)
            coordinadores.sort((a,b) => ((b.pctLms + b.pctAcomp)/2) - ((a.pctLms + a.pctAcomp)/2));

            const gPctLms = globals.totalAsigs > 0 ? (globals.lmsAprobados / globals.totalAsigs) * 100 : 0;
            const gPctAcp = globals.totalAsigs > 0 ? (globals.acompAprobados / globals.totalAsigs) * 100 : 0;
            const gAvance = ((gPctLms + gPctAcp) / 2).toFixed(1);

            // Renderizar 4 Cartas Superiores
            renderCoordKPIs(coordinadores.length, globals);

            // Ocultar o Mostrar secciones según CURRENT_TAB
            const cardLms = document.getElementById('cardGraphLms');
            const cardAcp = document.getElementById('cardGraphAcomp');
            const cardTrf = document.getElementById('cardGraphTrafico');
            
            const cardTot = document.getElementById('cardGraphTiemposTotal');
            const cardDed = document.getElementById('cardGraphTiemposDedic');
            const cardPro = document.getElementById('cardGraphTiemposPromedio');
            
            const contResumen = document.getElementById('containerTablaResumen');
            const contKpis = document.getElementById('coord-kpis');
            const contGraficas = document.getElementById('coordGridGraficas');
            const contDetalle = document.getElementById('containerTablaDetalle');
            
            
            // Lógica de Visibilidad Global
            // Otras pestañas: Mostrar KPIs, gráficas, detalle y tabla resumen (Siempre Visible)

                if(cardTot) cardTot.style.display = 'block';

            } else if(CURRENT_TAB === 'ACOMP') {

                if(cardTrf) cardTrf.style.display = 'none';
                if(cardTot) cardTot.style.display = 'none';

            // Renderizar Gráficos (Aislados con try-catch para jamás bloquear al sistema)

            // Renderizar Tablas
        try { renderCoordResumen(coordinadores); } catch(e) { console.error('Error en Tabla Resumen', e); }

                let badgeLms = '<span style="padding:4px 8px; border-radius:12px; font-size:11px; font-weight:800; background:' + bgLms + '; color:' + clLms + ';">' + numPctLms.toFixed(1) + '%</span>';

                let numPctAcp = Number(c.pctAcomp) || 0;
                let bgAcp = '#dcfce7'; let clAcp = '#15803d';
                if (numPctAcp < 100) { bgAcp = '#fef3c7'; clAcp = '#b45309'; }

                    htmlOut += '<td style="padding:14px 16px; text-align:center;">' + (valWa > 0 ? '<span style="color:#15803d; font-size:13px; font-weight:700; background:#dcfce7; padding:2px 8px; border-radius:10px;">' + valWa + '</span>' : '<span style="color:#94a3b8; font-size:11px;">-</span>') + '</td>';
                }
                htmlOut += '<td style="padding:14px 16px; text-align:center;">' + auditBadge + '</td></tr>';
            });

            tbody.innerHTML = htmlOut;
        } catch (err) {
            tbody.innerHTML = '<tr><td colspan="12"><div style="color:red; padding:20px; border:1px solid red; background:#fef2f2;"><b>ERROR RENDER TABLA RESUMEN:</b> ' + err.message + '</div></td></tr>';
            console.error(err);
        }
    }

    function renderCoordDetalleAsignaturas(dataArr) {

        }

        const tbody = document.getElementById('coord-asignaturas-body');
        tbody.innerHTML = '';
        
        dataArr.forEach(r => {
            let tr = document.createElement('tr');
            tr.className = 'border-b hover:bg-slate-50 transition-colors';
            
            let rawLmsTime = r.audit_lms || 0;
            let isIncomplete = false;
            
            if (CURRENT_WEEK_TAB !== 'ALL') {
                let wIdxOld = ['S1','S2','S3','S4'].indexOf(CURRENT_WEEK_TAB);
                let wIdxNew = ['BIEN','S1','S2','S3','S4','CIER'].indexOf(CURRENT_WEEK_TAB);
                if (r.audit_lms_w && wIdxOld !== -1 && r.audit_lms_w[wIdxOld] > 0) {
                    rawLmsTime = r.audit_lms_w[wIdxOld];
                } else if (r.ts_lms_w && wIdxNew !== -1 && r.ts_lms_w[wIdxNew] === -1) {
                    isIncomplete = true;
                } else {
                    rawLmsTime = 0;
                }
            } else {
                 if (rawLmsTime === 0 && r.startedLms) isIncomplete = true;
            }

            let formatLms = isIncomplete ? "Incompleto" : formatMinutes(rawLmsTime);
            let cssLms = isIncomplete ? "bg-red-100 text-red-800 border border-red-200" : "bg-blue-100 text-blue-800";
            
            let btnLms = r.s_lms !== null || r.startedLms ? `<span class="${cssLms} text-[10px] px-2 py-1 rounded font-bold whitespace-nowrap shadow-sm">${formatLms}</span>` : `<span class="text-xs text-gray-300">-</span>`;
            let btnAcp = r.s_acp !== null ? `<span class="bg-amber-100 text-amber-800 text-xs px-2 py-1 rounded font-bold whitespace-nowrap">${formatMinutes(r.ts_acp)}</span>` : `-`;
            
            let vAud = CURRENT_TAB === 'ACOMP' ? r.a_acp : r.a_lms;
            if (CURRENT_TAB === 'ALL') vAud = r.a;
            
            let audBag = vAud > 0 ? `<span class="bg-red-100 border border-red-300 text-red-700 text-xs px-2 py-1 rounded font-bold shadow-sm" title="Ráfagas Alertadas"><i class="fa-solid fa-triangle-exclamation mr-1"></i>${vAud}</span>` : `<span class="text-xs text-gray-300 font-bold">0</span>`;

            tr.innerHTML = `
                <td class="px-4 py-3 font-medium text-xs truncate max-w-[150px]" title="${r.prog}">${r.prog}</td>
                <td class="px-4 py-3 text-xs text-gray-800 truncate max-w-[200px]" title="${r.cur}">${r.cur}</td>
                <td class="px-4 py-3 text-xs text-gray-600 truncate max-w-[150px]" title="${r.doc}">${r.doc}</td>

                <td class="px-3 py-3 text-center border-l bg-blue-50/20">${btnLms}</td>
                <td class="px-3 py-3 text-center border-l bg-amber-50/20">${btnAcp}</td>
                <td class="px-3 py-3 text-center text-xs text-gray-600 font-bold border-l">${r.h}</td>
                <td class="px-3 py-3 text-center text-xs text-orange-600 font-bold border-l">${r.m}</td>
                <td class="px-3 py-3 text-center text-xs text-emerald-600 font-bold border-l">${r.w}</td>
                <td class="px-3 py-3 text-center border-l">${audBag}</td>
            `;
            tbody.appendChild(tr);
        });

        // Init DataTables
        dtCoordAsignaturasInst = new DataTable('#dtCoordAsignaturas', {
            language: { url: 'https://cdn.datatables.net/plug-ins/1.13.7/i18n/es-ES.json' },
            pageLength: 10,
            ordering: true,
            info: true,
            searching: true,
            responsive: false,
            // Modificamos el layout para ser compacto
            dom: '<"flex justify-between items-center mb-4"lf>rt<"flex justify-between items-center mt-4"ip>',
            order: [[0, "asc"]] // Order by program
        });

        // Visibilidad DataTables
        dtCoordAsignaturasInst.column(4).visible(CURRENT_TAB === 'ALL' || CURRENT_TAB === 'LMS');  // lms
        dtCoordAsignaturasInst.column(5).visible(CURRENT_TAB === 'ALL' || CURRENT_TAB === 'ACOMP');// acp
        
        let showTrafico = (CURRENT_TAB !== 'ACOMP');
        dtCoordAsignaturasInst.column(6).visible(showTrafico); // hits
        dtCoordAsignaturasInst.column(7).visible(showTrafico); // mails

    /** 
     * RENDER GRÁFICOS
     */
    function renderChartLmsAcomp(arr, canvasId, metricProperty, metricName, barColor) {
        if (!arr || arr.length === 0) return;
        
        let labels = arr.map(c => c.coord);
        let dataPct = arr.map(c => c[metricProperty]);
        
        const ctx = document.getElementById(canvasId);
        if(!ctx) return;
        
        // Destruir previas
        if(canvasId === 'chartCoordLms' && chartCoordLmsInst) chartCoordLmsInst.destroy();
        if(canvasId === 'chartCoordAcomp' && chartCoordAcompInst) chartCoordAcompInst.destroy();
        
        const chart = new Chart(ctx, {
            type: 'bar', // Horizontal bar is an option inside 'bar' via indexAxis
            data: {
                labels: labels,
                datasets: [{
                    label: `% Avance de Evaluaciones ${metricName}`,
                    data: dataPct,
                    backgroundColor: barColor,
                    borderRadius: 4,
                    barPercentage: 0.6
                }]
            },
            options: {
                indexAxis: 'y', // Barra horizontal!
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                         callbacks: { label: function(ctx) { return ctx.raw.toFixed(1) + '% Avance ' + metricName; } }
                    }
                },
                scales: {
                    x: { min: 0, max: 100, grid: { borderDash: [2, 4], color: '#e2e8f0' } },
                    y: { grid: { display: false } }
                }
            }
        });

        if(canvasId === 'chartCoordLms') chartCoordLmsInst = chart;
        else chartCoordAcompInst = chart;
    }

    function renderChartTiempos(arr) {
        if (!arr || arr.length === 0) return;
        
        let labels = arr.map(c => c.coord);
        
        let wIdx = -1;
        if (CURRENT_WEEK_TAB === 'S1') wIdx = 0;
        else if (CURRENT_WEEK_TAB === 'S2') wIdx = 1;
        else if (CURRENT_WEEK_TAB === 'S3') wIdx = 2;
        else if (CURRENT_WEEK_TAB === 'S4') wIdx = 3;

        let dataLms = arr.map(c => wIdx === -1 ? c.avgLms.toFixed(1) : Math.max(0, c.avgLmsW[wIdx]).toFixed(1));
        let dataAcp = arr.map(c => CURRENT_WEEK_TAB === 'ALL' ? c.avgAcomp.toFixed(1) : 0);
        let dataLmsTotal = arr.map(c => wIdx === -1 ? c.lmsTsTotal.toFixed(1) : Math.max(0, c.lmsTsTotalW[wIdx]).toFixed(1));
        let dataLmsDedic = arr.map(c => wIdx === -1 ? c.dedicLms : c.dedicLmsW[wIdx]);

        let strSufix = wIdx === -1 ? "" : (" - " + CURRENT_WEEK_TAB);
        let titleNodeProm = document.getElementById('tituloTiemposProm');
        if (titleNodeProm) titleNodeProm.innerText = "Tiempo Promedio por Asignatura Evaluada (Minutos)" + strSufix;
        let titleNodeTotal = document.getElementById('tituloTiemposTotal');
        if (titleNodeTotal) titleNodeTotal.innerText = "Tiempo Total Invertido (Suma Bruta)" + strSufix;
        let titleNodeDedic = document.getElementById('tituloTiemposDedic');
        if (titleNodeDedic) titleNodeDedic.innerText = "Índice Pedagógico: Dedicación por Carga Laboral " + strSufix;

        // Display visibility is handled in renderDashboard, but we update chart contents anyway

        // 1. Chart Promedios
        const ctx1 = document.getElementById('chartCoordTiempos');
        if(ctx1) {
            if(chartCoordTiemposInst) chartCoordTiemposInst.destroy();
            let ds1 = [];
            if (CURRENT_TAB === 'ALL' || CURRENT_TAB === 'LMS') {
                ds1.push({ label: 'LMS Promedio (Min)', data: dataLms, backgroundColor: '#60a5fa', borderRadius: 4 });
            }
            if (CURRENT_TAB === 'ALL' || CURRENT_TAB === 'ACOMP') {
                if(CURRENT_WEEK_TAB === 'ALL') {
                   ds1.push({ label: 'Acompañamiento Promedio (Min)', data: dataAcp, backgroundColor: '#fbbf24', borderRadius: 4 });
                }
            }
            chartCoordTiemposInst = new Chart(ctx1, {
                type: 'bar',
                data: { labels: labels, datasets: ds1 },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw} min` } } },
                    scales: { y: { beginAtZero: true }, x: { grid: { display: false } } }
                }
            });
        }

        // 2. Chart Absoluto (LMS)
        const ctx2 = document.getElementById('chartCoordTiemposTotal');
        if(ctx2 && CURRENT_TAB === 'LMS') {
            if(chartCoordTiemposTotalInst) chartCoordTiemposTotalInst.destroy();
            chartCoordTiemposTotalInst = new Chart(ctx2, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Tiempo Absoluto LMS (Min)', data: dataLmsTotal, backgroundColor: '#818cf8', borderRadius: 4 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw} min` } } },
                    scales: { y: { beginAtZero: true }, x: { grid: { display: false } } }
                }
            });
        }

        // 3. Chart Dedicacion (LMS)
        const ctx3 = document.getElementById('chartCoordTiemposDedic');
        if(ctx3 && CURRENT_TAB === 'LMS') {
            if(chartCoordTiemposDedicInst) chartCoordTiemposDedicInst.destroy();
            chartCoordTiemposDedicInst = new Chart(ctx3, {
                type: 'bar',
                data: { labels: labels, datasets: [{ label: 'Asignaturas Completadas (≤6h)', data: dataLmsDedic, backgroundColor: '#38bdf8', borderRadius: 4 }] },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: (ctx) => `${ctx.dataset.label}: ${ctx.raw} asig.` } } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } }, x: { grid: { display: false } } }
                }
            });
        }
    }

    function renderChartTrafico(arr) {
        if (!arr || arr.length === 0) return;

        let labels = arr.map(c => c.coord);
        let dataHits = arr.map(c => c.hits);
        let dataComms = arr.map(c => c.mails + c.wa); 
        // "Comms" as requested (Mails + WA added in the graph, but physically separated in table) Wait, user said ONLY separate!
        // The user said: "m por separado por favor" to visual table so I will graph them separated.
        let dataMails = arr.map(c => c.mails);
        let dataWa = arr.map(c => c.wa);

        const ctx = document.getElementById('chartCoordTrafico');
        if(!ctx) return;
        if(chartCoordTraficoInst) chartCoordTraficoInst.destroy();
        
        chartCoordTraficoInst = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Hits/Accesos (Aula Virtual)',
                        data: dataHits,
                        backgroundColor: '#cbd5e1', // Gris sutil
                    },
                    {
                        label: 'Correos Automáticos',
                        data: dataMails,
                        backgroundColor: '#f87171', // Red claro
                    },
                    {
                        label: 'WhatsApp',
                        data: dataWa,
                        backgroundColor: '#34d399', // Green
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth:12, font: {size:11} } }
                },
                scales: {
                    x: { stacked: true, grid: { display: false } }, // Barras apiladas (Stacked Bars)
                    y: { stacked: true, beginAtZero: true, grid: { borderDash: [2, 4], color: '#f1f5f9' } }
                }
            }
        });
    }

    /** MODAL CONTROL */
    function openCoordInfoModal(feature) {
        const modal = document.getElementById('coordInfoModal');
        const tit = document.getElementById('coordInfoTitle');
        const bod = document.getElementById('coordInfoBody');
        
        const data = COORD_MODAL_DATA[feature];
        if(!data) return;

        tit.innerHTML = `<i class="fa-solid ${data.icon} ${data.color} mr-2"></i> ${data.title}`;
        bod.innerHTML = data.content;

        modal.classList.remove('hidden');
        modal.classList.add('flex');
    }

    function closeCoordInfoModal() {
        const modal = document.getElementById('coordInfoModal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    /** GENERAR REPORTE PDF (html2pdf) */
    function generarReportePdfCoordinadores() {
        showToast("Generando Reporte", "Convirtiendo tablero a formato PDF con alta resolución...", "info");
        
        const originBtn = event.currentTarget.innerHTML;
        const btn = event.currentTarget;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';
        btn.disabled = true;

        if (typeof html2pdf === 'undefined') {
            showToast("Dependencia Faltante", "La librería html2pdf no cargó.", "error");
            btn.innerHTML = originBtn;
            btn.disabled = false;
            return;
        }

        const e = document.getElementById('coordPdfContainer');
        const dtTable = document.getElementById('dtCoordAsignaturas');
        const wrapperTable = dtTable ? dtTable.parentElement : null;

        // Clone el contenedor sin la tabla masiva "dtCoordAsignaturas" para no hacer un PDF de 50 páginas.
        const clone = e.cloneNode(true);
        // Quitar la sección de Detalladas si es muy grande.
        const dtDiv = clone.querySelector('#dtCoordAsignaturas');
        if(dtDiv && dtDiv.closest('.bg-white.rounded-xl.shadow-sm')) {
             dtDiv.closest('.bg-white.rounded-xl.shadow-sm').remove();
        } else if (dtDiv && dtDiv.parentElement.parentElement) {
            // Eliminar solo la última caja si la estructura no la halla
             let divs = clone.querySelectorAll('.bg-white');
             if(divs.length > 0) divs[divs.length-1].remove();
        }

        const opt = {
            margin: 10,
            filename: 'Métricas_Gestión_Coordinadores.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };

        html2pdf().set(opt).from(clone).save().then(() => {
            btn.innerHTML = originBtn;
            btn.disabled = false;
            showToast("¡Finalizado!", "Su archivo PDF se descargó.", "success");
        });
    }

    // =============================================================
    // El setup ya no inyecta HTML, usamos el HTML estático
    // =============================================================
